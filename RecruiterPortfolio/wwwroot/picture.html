<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Picture</title>
  <style>
    .profile-container {
      position: relative;
      display: inline-block;
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .overlay {
      display: flex;   /* show by default */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .overlay img {
      max-width: 80%;
      max-height: 80%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <img src="/mthobisiPic.jpeg" alt="Profile" class="profile-pic" id="profilePic">
  </div>

  <div class="overlay" id="overlay">
    <span class="close-btn" id="closeBtn">&times;</span>
    <img src="/mthobisiPic.jpeg" alt="Profile Enlarged">
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');

    // When X is clicked, redirect to Index.cshtml
    closeBtn.addEventListener('click', () => {
      window.location.href = "/Index"; // Razor Page route
    });
  </script>
</body>
</html>
